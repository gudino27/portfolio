server {
    listen 80;
    server_name _;
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # HTML document — no-cache so the browser always re-validates,
    # full security header set here since CSP/X-Frame-Options only
    # matter on document responses.
    location = /index.html {
        add_header Cache-Control "no-cache" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://cdn.jsdelivr.net; font-src 'self'; connect-src 'self' https://api.web3forms.com https://api.github.com; frame-src 'none'; object-src 'none'; base-uri 'self'; worker-src 'none';" always;
    }

    # SPA catch-all — also serves index.html for client-side routes.
    # try_files serves the file in this location context (no re-eval),
    # so the full header set must be repeated here.
    location / {
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://cdn.jsdelivr.net; font-src 'self'; connect-src 'self' https://api.web3forms.com https://api.github.com; frame-src 'none'; object-src 'none'; base-uri 'self'; worker-src 'none';" always;
        try_files $uri $uri/ /index.html;
    }

    # Fonts — explicit Content-Type for woff2 + long-lived cache.
    location ~* \.woff2$ {
        add_header Content-Type "font/woff2" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "public, immutable" always;
        expires 1y;
    }

    # Hashed static assets — immutable 1-year cache.
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|ttf|eot)$ {
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "public, immutable" always;
        expires 1y;
    }
}
